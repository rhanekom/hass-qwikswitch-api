name: "Lint"

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  ruff:
    name: "Ruff"
    runs-on: "ubuntu-latest"
    steps:
        - name: "Checkout the repository"
          uses: "actions/checkout@v7.0.0"

        - name: "Install uv"
          uses: "astral-sh/setup-uv@v8.3.2"
          with:
            version: "0.9.26"
            enable-cache: true

        - name: "Install dependencies"
          run: uv sync

        - name: "Lint"
          run: uv run ruff check .

        - name: "Format"
          run: uv run ruff format . --check
