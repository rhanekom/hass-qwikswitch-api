# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Actions are pinned to commit SHAs; Dependabot bumps the SHA and the
    # trailing version/branch comment. Group them into one PR to reduce noise.
    groups:
      github-actions:
        patterns:
          - "*"

  # Python dependencies are managed with uv (pyproject.toml + uv.lock). The
  # "uv" ecosystem updates both files together; the old "pip" ecosystem edited
  # a now-removed requirements.txt and left uv.lock stale.
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    # Collapse dependency bumps into a single PR to reduce noise.
    groups:
      python:
        patterns:
          - "*"
    ignore:
      # Home Assistant is bumped manually to stay in sync with the homeassistant
      # key in hacs.json (and the manifest requirements).
      - dependency-name: "homeassistant"
